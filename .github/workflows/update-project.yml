---
name: Update Project

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Mondays at 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-base-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository.
        uses: actions/checkout@v6

      - name: Set up Docker Buildx.
        uses: docker/setup-buildx-action@v4

      - name: Check for base image updates.
        id: check-updates
        run: |
          # Get current base image from Dockerfile
          BASE_IMAGE=$(grep "^FROM docker:" Dockerfile | head -1 | awk '{print $2}')

          echo "Current base image: $BASE_IMAGE"

          if [ -z "$BASE_IMAGE" ]; then
            echo "Error: Could not extract base image from Dockerfile"
            exit 1
          fi

          # Get current local digest (from last build)
          LOCAL_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$BASE_IMAGE" 2>/dev/null | grep -oP 'sha256:[a-f0-9]{64}' || echo "")

          # Pull latest version
          docker pull "$BASE_IMAGE" --quiet

          # Get remote digest after pull
          REMOTE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$BASE_IMAGE" | grep -oP 'sha256:[a-f0-9]{64}' | head -1)

          echo "base_digest=$REMOTE_DIGEST" >> $GITHUB_OUTPUT

          # Check if digest changed (or if this is a first run with no local digest)
          if [ -z "$LOCAL_DIGEST" ] || [ "$REMOTE_DIGEST" != "$LOCAL_DIGEST" ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Build test image.
        if: steps.check-updates.outputs.updates_available == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: test-image:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Pull Request.
        if: steps.check-updates.outputs.updates_available == 'true'
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update base image dependencies'
          title: 'chore(deps): update base image dependencies'
          body: |
            ## Automated Base Image Update

            This PR updates the base Docker images to their latest versions.

            ### Changes
            - Base image digest: `${{ steps.check-updates.outputs.base_digest }}`

            ### Testing
            - Build test completed successfully
            - Please review and test the updated images before merging

            ---
            *This PR was automatically generated by the update-project workflow.*
          branch: chore/update-base-images
          delete-branch: true
          assignees: SimplicityGuy
          labels: dependencies,automated,docker

      - name: Send notification to Discord.
        uses: sarisia/actions-status-discord@b8381b25576cb341b2af39926ab42c5056cc44ed # v1.15.5
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
